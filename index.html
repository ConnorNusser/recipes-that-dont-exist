<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recipes That Don't Exist</title>
  <meta name="description" content="One recipe a day from a timeline that never happened. Real ingredients, impossible history." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400..700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🍲</text></svg>" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="workspace">
          <span class="workspace-icon">R</span>
          <span class="workspace-name">Recipes That Don't Exist</span>
        </div>
      </div>

      <nav class="nav-section">
        <a class="nav-item" id="nav-today" href="#">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8.75-4a.75.75 0 0 0-1.5 0v4c0 .27.14.52.38.65l2.5 1.5a.75.75 0 1 0 .77-1.3L8.75 7.58V4Z"/></svg>
          Today's drop
        </a>
        <a class="nav-item" id="nav-about" href="#/about">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0ZM6.92 6.085h.001a.749.749 0 1 1-1.342-.67c.169-.339.436-.701.849-.977C6.845 4.16 7.369 4 8 4a2.76 2.76 0 0 1 1.637.525c.503.377.863.965.863 1.725 0 .448-.115.83-.329 1.15-.205.307-.47.513-.692.662-.109.072-.22.138-.313.195l-.006.004a6.24 6.24 0 0 0-.26.16.952.952 0 0 0-.276.245.75.75 0 0 1-1.248-.832c.184-.264.42-.489.692-.661.103-.067.207-.132.313-.195l.007-.004c.1-.061.182-.11.258-.161a.969.969 0 0 0 .277-.245C8.96 6.514 9 6.427 9 6.25a.612.612 0 0 0-.262-.525A1.27 1.27 0 0 0 8 5.5c-.369 0-.595.09-.74.187a1.01 1.01 0 0 0-.34.398ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>
          How this works
        </a>
      </nav>

      <div class="nav-section">
        <div class="nav-label">Archive</div>
        <div id="archive-list"></div>
      </div>

      <div class="sidebar-footer">
        <div class="streak" id="streak-box" title="Daily guessing streak">
          <span class="streak-flame">🔥</span>
          <span id="streak-count">0</span> day streak
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Menu">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.25c0-.41.34-.75.75-.75h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 3.25Zm0 4.75c0-.41.34-.75.75-.75h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 8Zm.75 4a.75.75 0 0 0 0 1.5h12.5a.75.75 0 0 0 0-1.5H1.75Z"/></svg>
        </button>
        <div class="breadcrumb">
          <span class="crumb-root">Recipes</span>
          <span class="crumb-sep">›</span>
          <span class="crumb-id" id="crumb-id">—</span>
        </div>
        <div class="topbar-right">
          <div class="countdown-chip" title="Time until the next recipe drops (00:00 UTC)">
            <span class="pulse-dot"></span>
            next drop <span id="countdown">--:--:--</span>
          </div>
        </div>
      </header>

      <div class="content" id="content">
        <div class="loading">Summoning a timeline…</div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
