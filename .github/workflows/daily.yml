name: Daily recipe drop

on:
  schedule:
    - cron: "7 0 * * *" # shortly after 00:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-recipe
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate today's recipe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.mjs

      - name: Commit and push
        run: |
          git config user.name "recipe-bot"
          git config user.email "actions@github.com"
          git add public/recipes/
          if git diff --cached --quiet; then
            echo "No new recipe to commit."
          else
            TITLE=$(node -e "const i=require('./public/recipes/index.json');console.log(i.recipes[0].id+': '+i.recipes[0].title)")
            git commit -m "Daily drop — $TITLE"
            git push
          fi
